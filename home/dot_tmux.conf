# tmux configuration
# Session persistence for Claude Code agent sessions

# Prefix key: Ctrl+a (more ergonomic than Ctrl+b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Terminal settings
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# Mouse support (scroll, click panes, resize panes)
set -g mouse on

# Vi mode for copy
setw -g mode-keys vi

# macOS clipboard integration
set -g set-clipboard on
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Start windows and panes at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Large scrollback buffer (matches Ghostty)
set -g history-limit 100000

# Reduce escape time (faster vim mode switching)
set -sg escape-time 10

# Increase repeat timeout
set -g repeat-time 600

# Focus events (needed for vim/neovim autoread)
set -g focus-events on

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g status-left "#[fg=green,bold] #S "
set -g status-right "#[fg=yellow] %H:%M #[fg=cyan] %d-%b "

# Session management shortcuts
bind S command-prompt -p "New session name:" "new-session -s '%%'"
bind K confirm-before -p "Kill session #S? (y/n)" kill-session

# Named session helpers for agent work
# Usage: tmux new -s agent-feature-name
# Usage: tmux attach -t agent-feature-name
